name: "Camera RGB → MQTT"
version: "2.0.0"
slug: "camera_rgb_mqtt"
description: "Liest einen RTSP-Kamerastream mit 15 fps, berechnet den Durchschnitts-RGB-Wert und sendet ihn per MQTT an Home Assistant."
url: "https://github.com/your-repo/camera-rgb-mqtt"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

hassio_api: false
homeassistant_api: false

options:
  rtsp_url: "rtsp://192.168.1.100:554/stream"
  target_fps: 15
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic: "homeassistant/sensor/camera_rgb/state"

schema:
  rtsp_url: str
  target_fps: int
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  mqtt_topic: str

image: "ghcr.io/home-assistant/{arch}-base-python:3.11"
